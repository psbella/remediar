# .github/workflows/
name: 🟢 Desactivar mantenimiento

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-main-write
  cancel-in-progress: false

jobs:
  maintenance-off:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Restaurar index
        run: |
          cp index.html.bak index.html
          rm index.html.bak

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git rm index.html.bak
          git commit -m "chore: restore site from maintenance"
          git push
