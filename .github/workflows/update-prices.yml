name: Actualizar precios

on:
  schedule:
    - cron: '0 12,18 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          pip install pymupdf pandas tabula-py
          sudo apt-get update
          sudo apt-get install -y default-jre

      - name: Ejecutar pdf_to_csv_tabula.py
        run: python scripts/pdf_to_csv_tabula.py

      - name: Convertir CSV a JSON
        run: python scripts/csv_to_json.py

      - name: Generar landings
        run: python scripts/generar_landings.py

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/medicamentos.csv data/medicamentos.json
          git add *.html
          git commit -m "⚕️ Actualizar precios $(date +'%Y-%m-%d')" || echo "No changes"
          git pull origin main --rebase
          git push origin main
