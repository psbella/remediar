name: 🔃 Actualizar precios
on:
  schedule:
    - cron: '30 13,21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: repo-main-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar pdf_to_json.py
        run: python scripts/pdf_to_json.py
      - name: Subir debug a GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/subir_debug.py
      - name: Verificar sanidad del output
        run: pytest tests/ -v
      - name: Snapshot semanal (solo viernes)
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(date +%u)" = "5" ]; then
            echo "Viernes detectado — generando snapshot semanal..."
            python scripts/snapshot_semanal.py
          else
            echo "No es viernes, saltando snapshot."
          fi
      - name: Commit y push
        id: commit_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/medicamentos.json
          git add data/outlier_report.json
          git add data/presentaciones_debug.csv
          git commit -m "Actualizar precios $(date +'%Y-%m-%d')" || echo "No changes"
          git pull --rebase origin main
          git push origin main

      - name: Avisar si fallo el commit/push
        # Se dispara solo si ESTE paso especifico fallo (no si pytest u otro
        # paso anterior corto antes de llegar aca). No bloquea el job: solo
        # deja un issue para que quede visible sin tener que revisar Actions
        # a mano. Evita duplicados si ya hay un issue abierto sin resolver.
        if: always() && steps.commit_push.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ci-push-failure --repo "$GITHUB_REPOSITORY" \
            --color "B60205" \
            --description "Fallo el commit/push automatico de update_prices.yml" 2>/dev/null || true
          ya_existe=$(gh issue list --repo "$GITHUB_REPOSITORY" --label ci-push-failure --state open --json number --jq 'length')
          if [ "$ya_existe" != "0" ]; then
            echo "Ya hay un issue abierto de este tipo, no se crea uno nuevo."
            exit 0
          fi
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "update_prices: fallo el commit/push del $(date +'%Y-%m-%d')" \
            --label ci-push-failure \
            --body "El JSON se genero y paso los tests de sanidad (pytest), pero el paso de commit/push a main fallo, probablemente un conflicto de git pull --rebase con un push concurrente. No hay perdida de datos: la proxima corrida programada regenera todo desde el PDF fuente. Ver el log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
