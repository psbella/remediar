name: 🧹 Lint (no bloqueante)

on:

  push:

    branches: [main]

  pull_request:

    branches: [main]

permissions:

  contents: read

jobs:

  lint:

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      - name: Checkout

        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python

        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6

        with:

          python-version: '3.11'

          cache: 'pip'

      - name: Instalar ruff

        run: pip install ruff==0.14.0

      - name: Ruff (Python)

        # No bloqueante: los findings actuales son de estilo, no de logica.

        continue-on-error: true

        run: ruff check .

      - name: Setup Node

        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4

        with:

          node-version: '20'

      - name: Instalar eslint

        run: npm install eslint@9 --no-save

      - name: ESLint (JavaScript)

        # No bloqueante por el mismo motivo que ruff.

        continue-on-error: true

        run: npx eslint js/

