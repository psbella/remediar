name: Actualizar precios

on:
  schedule:
    - cron: '30 13 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pymupdf

      - name: PDF → CSV
        run: python scripts/pdf_to_csv.py

      - name: CSV → JSON
        run: python scripts/csv_to_json.py

      - name: Generar landings
        run: python scripts/generar_landings.py

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/*.json data/*.csv *.html
          git commit -m "Actualizar precios $(date +'%Y-%m-%d')" || echo "No changes"
          git pull origin main --rebase
          git push origin main
