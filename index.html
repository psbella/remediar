<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>remedi.ar - En mantenimiento</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="mantenimiento.css">
</head>
<body>
<div class="card">
    <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 71 71" width="36" height="36">
            <circle cx="35.5" cy="35.5" r="35.5" fill="#00897b"/>
            <rect x="30" y="18" width="11" height="35" rx="3" fill="#ffffff"/>
            <rect x="18" y="30" width="35" height="11" rx="3" fill="#ffffff"/>
            <g transform="translate(51,51) rotate(-45) scale(0.5)">
                <rect x="-10" y="-10" width="20" height="20" rx="10" fill="#b2dfdb" opacity="0.9"/>
                <line x1="-10" y1="0" x2="10" y2="0" stroke="#ffffff" stroke-width="2"/>
            </g>
        </svg>
        <span class="logo-txt">remedi.ar</span>
    </div>
    <h1>En mantenimiento</h1>
    <p>Estamos haciendo mejoras al sitio.</p>
    <span class="eta" id="eta">Volvemos pronto</span>
    <p class="footer-txt">remedi.ar · Precios de medicamentos en Argentina</p>
</div>
<script>
    // Opcional: mostrar un contador regresivo.
    // Configurar VUELVE_EN_MINUTOS para el tiempo estimado.
    const VUELVE_EN_MINUTOS = 0; // 0 = desactivado
    if (VUELVE_EN_MINUTOS > 0) {
        const fin = Date.now() + VUELVE_EN_MINUTOS * 60 * 1000;
        const eta = document.getElementById('eta');
        const tick = () => {
            const resto = Math.max(0, fin - Date.now());
            const min   = Math.floor(resto / 60000);
            const seg   = Math.floor((resto % 60000) / 1000);
            eta.textContent = resto > 0
                ? `Volvemos en ${min}:${String(seg).padStart(2,'0')}`
                : 'Recargando...';
            if (resto <= 0) location.reload();
        };
        tick();
        setInterval(tick, 1000);
    }
</script>
</body>
</html>
