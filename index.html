<body>
<div class="container">

    <div style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg">
        <symbol id="ic-search"  viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/></symbol>
        <symbol id="ic-pill" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
		<path d="M12 3a5 5 0 0 1 5 5v8a5 5 0 0 1-10 0V8a5 5 0 0 1 5-5z"/>
		<line x1="7" y1="12" x2="17" y2="12" stroke-width="1.5"/>
		<path d="M9 8.5a3 3 0 0 1 6 0" stroke-width="1.2" stroke-dasharray="2 1.5"/>
		</symbol>>
        <symbol id="ic-clock"   viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
        <symbol id="ic-list"    viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></symbol>
        <symbol id="ic-factory" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
		<rect x="3" y="5" width="18" height="16" rx="1"/>
		<line x1="2" y1="21" x2="22" y2="21"/>
		<line x1="3" y1="10" x2="21" y2="10"/>
		<line x1="12" y1="13" x2="12" y2="18"/>
		<line x1="9.5" y1="15.5" x2="14.5" y2="15.5"/>
		</symbol>
        <symbol id="ic-chevron" viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="6 9 12 15 18 9"/></symbol>
        <symbol id="ic-sort"    viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="9" y1="18" x2="15" y2="18"/></symbol>
        <symbol id="ic-info"    viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></symbol>
        <symbol id="ic-shield"  viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
        <symbol id="ic-file"    viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></symbol>
        <symbol id="ic-mail"    viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></symbol>
      </svg>
    </div>

    <header class="header">
        <div class="header-logo-circle">
            <img src="img/favicon.svg" alt="remedi.ar" width="38" height="38">
        </div>
        <div class="header-texto">
            <h1>remedi.ar - Precios de medicamentos</h1>
            <p>remedi.ar · Precio público · Precio PAMI</p>
        </div>
        <div class="header-right">
            <div class="update-pill">
                <span class="update-pill-dot"></span>
                <div style="display:flex;flex-direction:column;line-height:1.2;">
                    <span style="font-size:9px;font-weight:normal;">Última actualización</span>
                    <span id="fecha-actualizacion" style="font-size:10px;font-weight:500;">Cargando...</span>
                </div>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
        </div>
    </header>

    <main>
        <div class="busqueda-section">
            <svg width="20" height="20"><use href="#ic-search"/></svg>
            <input
                type="search"
                id="buscador"
                placeholder="Buscá por nombre, principio activo o laboratorio..."
                autocomplete="off"
                spellcheck="false"
                aria-label="Buscar medicamento"
            >
            <button id="btnBuscar" aria-label="Buscar">
                <svg width="16" height="16"><use href="#ic-search"/></svg>
                Buscar
            </button>
        </div>

        <section class="filtros-section" aria-label="Filtros">
            <div class="filtro-row">
                <svg class="icon-left" width="16" height="16"><use href="#ic-list"/></svg>
                <select id="filtroPresentacion" aria-label="Filtrar por presentación">
                    <option value="">Presentación: Todas</option>
                </select>
                <svg class="icon-right" width="14" height="14"><use href="#ic-chevron"/></svg>
            </div>
            <div class="filtro-row">
                <svg class="icon-left" width="16" height="16"><use href="#ic-factory"/></svg>
                <select id="filtroLaboratorio" aria-label="Filtrar por laboratorio">
                    <option value="">Laboratorio: Todos</option>
                </select>
                <svg class="icon-right" width="14" height="14"><use href="#ic-chevron"/></svg>
            </div>
            <div class="filtro-row">
                <svg class="icon-left" width="16" height="16"><use href="#ic-sort"/></svg>
                <select id="ordenPrecio" aria-label="Ordenar resultados">
                    <option value="relevancia" selected>Relevancia + vigencia</option>
                    <option value="precio_asc">Menor precio primero</option>
                    <option value="precio_desc">Mayor precio primero</option>
                </select>
                <svg class="icon-right" width="14" height="14"><use href="#ic-chevron"/></svg>
            </div>
        </section>

        <div class="results-header">
            <div id="contador" class="contador" role="status" aria-live="polite"></div>
        </div>

        <div id="resultados" class="resultados" role="region" aria-label="Resultados"></div>
    </main>

    <div class="footer">
        <div class="footer-update">
            <span>🕒 Última actualización: <strong id="fecha-actualizacion-footer">Cargando...</strong></span>
        </div>
        <div class="footer-aviso">
            <svg width="14" height="14"><use href="#ic-info"/></svg>
            Datos: <a href="https://siafar.com/datos" target="_blank" rel="noopener">Siafar / COFA</a> — Precios orientativos. Verificá en tu farmacia.
        </div>
        <nav class="footer-links">
            <a href="privacidad.html"><svg width="13" height="13"><use href="#ic-shield"/></svg>Privacidad</a>
            <a href="terminos.html"><svg width="13" height="13"><use href="#ic-file"/></svg>Términos</a>
            <a href="mailto:pablo.s.bella@gmail.com?subject=remedi.ar%20-%20Consulta"><svg width="13" height="13"><use href="#ic-mail"/></svg>Contacto</a>
        </nav>
    </div>
    </footer>

</div>

</body>
</html>
