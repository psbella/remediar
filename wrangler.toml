# Config del Worker "remediar" — espejo estático de remedi.ar.
# Worker sin lógica dinámica: solo sirve los mismos archivos que
# publica GitHub Pages (origen real, proxied por Cloudflare).
#
# Deploy: npx wrangler deploy

name = "remediar"
compatibility_date = "2026-07-04"

[assets]
directory = "./"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"
