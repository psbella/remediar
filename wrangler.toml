# Config del Worker "remedios" — espejo estático de remedi.ar.
# Worker sin lógica dinámica: solo sirve los mismos archivos que
# publica GitHub Pages / Cloudflare Pages (producción principal).
#
# Deploy: npx wrangler deploy

name = "remedios"
compatibility_date = "2026-07-04"

[assets]
directory = "./"
not_found_handling = "404-page"
html_handling = "none"
